input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => [
      "security-auth-log",
      "nginx-access-log",
      "docker-container-log"
    ]
    group_id => "logstash-etl-consumer"
    codec => plain
    decorate_events => basic
  }
}

filter {
  mutate {
    add_field => {
      "raw_message" => "%{message}"
      "pipeline_stage" => "raw_ingest"
    }
  }

  if [@metadata][kafka][topic] == "security-auth-log" {
    mutate {
      add_field => {
        "log_source" => "security-auth-log"
      }
      replace => {
        "pipeline_stage" => "parsed_auth"
      }
    }

    if [message] =~ /Failed password for invalid user/ {
      grok {
        match => {
          "message" => "%{SYSLOGTIMESTAMP:auth_timestamp} %{HOSTNAME:host_name} sshd\[%{POSINT:process_id}\]: Failed password for invalid user %{USERNAME:username} from %{IP:source_ip} port %{POSINT:source_port:int} ssh2"
        }
      }
      mutate {
        add_field => {
          "service" => "sshd"
          "event_type" => "ssh_failed_login"
          "status" => "failed"
          "log_level" => "info"
        }
      }
    } else if [message] =~ /Failed password for/ {
      grok {
        match => {
          "message" => "%{SYSLOGTIMESTAMP:auth_timestamp} %{HOSTNAME:host_name} sshd\[%{POSINT:process_id}\]: Failed password for %{USERNAME:username} from %{IP:source_ip} port %{POSINT:source_port:int} ssh2"
        }
      }
      mutate {
        add_field => {
          "service" => "sshd"
          "event_type" => "ssh_failed_login"
          "status" => "failed"
          "log_level" => "info"
        }
      }
    } else if [message] =~ /Accepted (password|publickey) for/ {
      grok {
        match => {
          "message" => "%{SYSLOGTIMESTAMP:auth_timestamp} %{HOSTNAME:host_name} sshd\[%{POSINT:process_id}\]: Accepted %{WORD:auth_method} for %{USERNAME:username} from %{IP:source_ip} port %{POSINT:source_port:int} ssh2"
        }
      }
      mutate {
        add_field => {
          "service" => "sshd"
          "event_type" => "ssh_success_login"
          "status" => "success"
          "log_level" => "info"
        }
      }
    } else if [message] =~ /sudo:/ {
      grok {
        match => {
          "message" => "%{SYSLOGTIMESTAMP:auth_timestamp} %{HOSTNAME:host_name} sudo:\s+%{USERNAME:username}\s+: %{GREEDYDATA:sudo_detail}COMMAND=%{GREEDYDATA:sudo_command}"
        }
      }
      mutate {
        add_field => {
          "service" => "sudo"
          "event_type" => "sudo_command"
          "status" => "success"
          "log_level" => "info"
        }
      }
    }

    if [username] == "root" and [status] == "success" {
      mutate {
        replace => {
          "event_type" => "root_login"
        }
      }
    }

    if [auth_timestamp] {
      date {
        match => ["auth_timestamp", "MMM dd HH:mm:ss"]
        target => "@timestamp"
        timezone => "Asia/Seoul"
      }
    }
  }
}

output {
  if [@metadata][kafka][topic] == "security-auth-log" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "security-auth-log-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "etl-raw-log-%{+YYYY.MM.dd}"
    }
  }

  stdout {
    codec => rubydebug
  }
}
